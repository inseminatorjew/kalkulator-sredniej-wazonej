<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalkulator Średniej Ważonej</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0e0c;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #d4c9a8;
      padding: 2rem 1rem 4rem;
    }

    /* ── HEADER ── */
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.3rem);
      font-weight: 700;
      color: #e8c878;
      letter-spacing: 0.05em;
    }
    .header p {
      margin-top: 0.3rem;
      font-size: 0.8rem;
      color: #887a60;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #e8c87840, transparent);
      margin: 0.8rem auto;
      max-width: 800px;
    }

    /* ── GROUPS ── */
    #groups { display: flex; flex-direction: column; gap: 1.4rem; max-width: 800px; margin: 0 auto; }

    .group-card {
      border-radius: 8px;
      padding: 1.3rem 1.5rem 1.4rem;
      transition: box-shadow 0.2s;
      position: relative;
    }
    .group-card:hover { box-shadow: 0 4px 32px rgba(0,0,0,0.5); }

    /* ── GROUP HEADER ── */
    .group-header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 1.1rem;
    }
    .group-label-input {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      color: inherit;
      width: 130px;
      transition: border-color 0.15s;
      padding-bottom: 1px;
    }
    .group-label-input:focus { outline: none; border-bottom-color: currentColor; }

    .weight-group {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-left: 0.3rem;
    }
    .weight-label { font-size: 0.72rem; color: #665a40; letter-spacing: 0.1em; }
    .weight-input {
      font-family: 'Source Code Pro', monospace;
      font-size: 0.9rem;
      font-weight: 600;
      background: transparent;
      border: none;
      border-bottom: 1px dashed;
      width: 62px;
      text-align: center;
      padding-bottom: 1px;
      transition: background 0.15s;
      -moz-appearance: textfield;
    }
    .weight-input::-webkit-inner-spin-button { display: none; }
    .weight-input:focus { outline: none; background: rgba(255,255,255,0.05); border-radius: 3px 3px 0 0; }

    .badge {
      border-radius: 20px;
      padding: 2px 9px;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
    }
    .group-stats {
      margin-left: auto;
      text-align: right;
      font-size: 0.78rem;
      color: #887a60;
      white-space: nowrap;
    }
    .group-stats .num { font-family: 'Source Code Pro', monospace; font-size: 0.9rem; }

    .remove-btn {
      margin-left: 0.5rem;
      background: transparent;
      border: 1px solid #333;
      color: #554a38;
      border-radius: 4px;
      width: 24px; height: 24px;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .remove-btn:hover { border-color: #e05050; color: #e05050; background: #e0505015; }

    /* ── VALUES GRID ── */
    .values-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
      gap: 0.55rem;
    }

    .slot { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .slot-num {
      font-size: 0.6rem;
      color: #554a38;
      font-family: 'Source Code Pro', monospace;
      height: 12px;
      line-height: 12px;
    }
    .val-input {
      width: 100%;
      aspect-ratio: 1;
      text-align: center;
      font-size: 1rem;
      font-family: 'Source Code Pro', monospace;
      font-weight: 600;
      border-radius: 5px;
      cursor: text;
      transition: all 0.12s, transform 0.1s;
      -moz-appearance: textfield;
    }
    .val-input::-webkit-inner-spin-button,
    .val-input::-webkit-outer-spin-button { display: none; }
    .val-input:focus { outline: none; transform: scale(1.08); }
    .val-input.empty {
      background: #ffffff08;
      border: 1px solid #2a2520;
      color: #444;
    }
    .val-input.filled {
      background: var(--c-fill);
      border: 1px solid var(--c-border);
      color: var(--c-text);
    }
    .val-input.add-slot {
      background: #ffffff05;
      border: 1px dashed #2a2520;
      color: #333;
      font-size: 1.3rem;
      font-weight: 300;
    }
    .val-input.add-slot:hover { border-color: #554a38; color: #665a40; }

    .slot-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      transition: background 0.12s;
    }

    /* ── ADD GROUP BUTTON ── */
    #add-group-btn {
      display: block;
      max-width: 800px;
      margin: 0.5rem auto 0;
      width: 100%;
      background: #ffffff05;
      border: 1px dashed #2a2520;
      color: #665a40;
      border-radius: 8px;
      padding: 0.7rem;
      cursor: pointer;
      font-family: 'Georgia', serif;
      font-size: 0.82rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    #add-group-btn:hover { border-color: #e8c87850; color: #e8c878; background: #e8c87808; }

    /* ── RESULT PANEL ── */
    #result-panel {
      max-width: 800px;
      margin: 1.5rem auto 0;
      border-radius: 8px;
      padding: 1.4rem 1.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      background: #111008;
      border: 1px solid #2a2510;
      transition: border-color 0.3s, background 0.3s;
    }

    .result-left .result-label {
      font-size: 0.72rem;
      color: #887a60;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }
    .result-value {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      transition: color 0.3s, font-size 0.2s;
    }

    .breakdown { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-start; }
    .breakdown-item { text-align: center; min-width: 54px; }
    .breakdown-wlabel { font-size: 0.67rem; letter-spacing: 0.08em; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
    .breakdown-avg { font-family: 'Source Code Pro', monospace; font-size: 1rem; color: #ccc; }
    .breakdown-weight { font-size: 0.62rem; color: #555; }

    .result-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.6rem; }
    .weight-sum-badge {
      font-size: 0.7rem;
      font-family: 'Source Code Pro', monospace;
      border-radius: 4px;
      padding: 2px 8px;
    }
    .clear-btn {
      background: #1a1408;
      border: 1px solid #3a2e18;
      color: #887a60;
      border-radius: 5px;
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      font-family: 'Georgia', serif;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .clear-btn:hover { background: #3a2a0a; }

    /* ── WEIGHT WARNING ── */
    .weight-warning {
      max-width: 800px;
      margin: 0.5rem auto 0;
      font-size: 0.73rem;
      color: #e89038;
      text-align: center;
      letter-spacing: 0.05em;
      min-height: 1.2em;
      transition: opacity 0.2s;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Kalkulator Średniej Ważonej</h1>
  <p>Wpisz wartości i wagi · Enter przeskakuje dalej · Tab zmienia grupę</p>
  <div class="divider"></div>
</div>

<div id="groups"></div>
<button id="add-group-btn">+ Dodaj grupę</button>
<div class="weight-warning" id="weight-warning"></div>
<div id="result-panel">
  <div class="result-left">
    <div class="result-label">Średnia ważona</div>
    <div class="result-value" style="font-size:2rem;color:#333">—</div>
  </div>
</div>

<script>
// ── PALETTE ──────────────────────────────────────────────────
const PALETTE = [
  { color:"#e8a838", bg:"#2a1f0a", border:"#e8a83830" },
  { color:"#5db8f5", bg:"#0a1525", border:"#5db8f530" },
  { color:"#7ecfa0", bg:"#0d1f14", border:"#7ecfa030" },
  { color:"#e87878", bg:"#250a0a", border:"#e8787830" },
  { color:"#b878e8", bg:"#1a0a25", border:"#b878e830" },
  { color:"#e8d450", bg:"#252008", border:"#e8d45030" },
  { color:"#78c8e8", bg:"#0a2025", border:"#78c8e830" },
  { color:"#e878b8", bg:"#250a1a", border:"#e878b830" },
];
function pal(i) { return PALETTE[i % PALETTE.length]; }

// ── STATE ─────────────────────────────────────────────────────
let groups = [
  { id: 0, label: "Grupa A", weight: 0.500, values: [""] },
  { id: 1, label: "Grupa B", weight: 0.300, values: [""] },
  { id: 2, label: "Grupa C", weight: 0.200, values: [""] },
];
let nextId = 3;

// ── HELPERS ───────────────────────────────────────────────────
function weightSum() {
  return groups.reduce((s, g) => s + (parseFloat(g.weight) || 0), 0);
}

function groupStats(g) {
  const valid = g.values.filter(v => v !== "" && !isNaN(parseFloat(v))).map(Number);
  const count = valid.length;
  const avg = count > 0 ? (valid.reduce((a, b) => a + b, 0) / count) : null;
  return { count, avg };
}

function calcResult() {
  let wSum = 0, wValSum = 0, hasAny = false;
  groups.forEach(g => {
    const { avg } = groupStats(g);
    const w = parseFloat(g.weight) || 0;
    if (avg !== null && w > 0) {
      hasAny = true;
      wValSum += avg * w;
      wSum += w;
    }
  });
  return (hasAny && wSum > 0) ? (wValSum / wSum) : null;
}

// ── RESULT UPDATE ─────────────────────────────────────────────
function updateResult() {
  const result = calcResult();
  const panel = document.getElementById("result-panel");
  const warnEl = document.getElementById("weight-warning");

  const ws = weightSum();
  const wsStr = ws.toFixed(3);
  const wsOk = Math.abs(ws - 1.0) < 0.001;

  warnEl.textContent = (!wsOk && groups.length > 0)
    ? `⚠ Suma wag wynosi ${wsStr} (zamiast 1.000). Wynik jest przeliczony względem sumy wag.`
    : "";

  if (!result) {
    panel.style.background = "#111008";
    panel.style.borderColor = "#2a2510";
    panel.innerHTML = `
      <div class="result-left">
        <div class="result-label">Średnia ważona</div>
        <div class="result-value" style="font-size:2rem;color:#333">—</div>
      </div>
      <div class="result-right">
        <button class="clear-btn" onclick="clearAll()">Wyczyść wszystko</button>
      </div>`;
    return;
  }

  const r = parseFloat(result);
  panel.style.background = "linear-gradient(135deg,#1a1508,#1a1008)";
  panel.style.borderColor = "#e8c87860";

  let breakdownHTML = `<div class="breakdown">`;
  groups.forEach(g => {
    const { avg } = groupStats(g);
    const p = pal(groups.indexOf(g));
    if (avg !== null) {
      breakdownHTML += `
        <div class="breakdown-item">
          <div class="breakdown-wlabel" style="color:${p.color}" title="${g.label}">${g.label}</div>
          <div class="breakdown-avg">${avg.toFixed(3)}</div>
          <div class="breakdown-weight">× ${parseFloat(g.weight).toFixed(3)}</div>
        </div>`;
    }
  });
  breakdownHTML += `</div>`;

  panel.innerHTML = `
    <div class="result-left">
      <div class="result-label">Średnia ważona</div>
      <div class="result-value" style="font-size:3rem;color:#e8c878">${result.toFixed(4)}</div>
    </div>
    ${breakdownHTML}
    <div class="result-right">
      <button class="clear-btn" onclick="clearAll()">Wyczyść wszystko</button>
    </div>`;
}

// ── SLOT UPDATE (single slot style) ──────────────────────────
function styleInput(input, val, p) {
  if (val === "" || val === null) {
    input.classList.remove("filled");
    input.classList.add("empty");
    input.style.removeProperty("--c-fill");
    input.style.removeProperty("--c-border");
    input.style.removeProperty("--c-text");
  } else {
    input.classList.remove("empty");
    input.classList.add("filled");
    input.style.setProperty("--c-fill", p.color + "1a");
    input.style.setProperty("--c-border", p.color + "80");
    input.style.setProperty("--c-text", p.color);
  }
}

// ── RENDER GROUP VALUES ───────────────────────────────────────
function renderGroupValues(gid) {
  const g = groups.find(g => g.id === gid);
  if (!g) return;
  const p = pal(groups.indexOf(g));
  const container = document.getElementById(`values-${gid}`);
  if (!container) return;

  // Remember focused slot index
  const focused = document.activeElement;
  let focusedIdx = null;
  if (focused && focused.closest && focused.closest(`#values-${gid}`)) {
    focusedIdx = parseInt(focused.dataset.idx);
  }

  container.innerHTML = "";

  // Ensure exactly one trailing empty slot
  while (g.values.length > 1 &&
         g.values[g.values.length - 1] === "" &&
         g.values[g.values.length - 2] === "") {
    g.values.pop();
  }
  if (g.values[g.values.length - 1] !== "") {
    g.values.push("");
  }

  g.values.forEach((val, idx) => {
    const isLast = idx === g.values.length - 1;
    const slot = document.createElement("div");
    slot.className = "slot";

    const num = document.createElement("div");
    num.className = "slot-num";
    num.textContent = isLast ? "" : (idx + 1);

    const input = document.createElement("input");
    input.type = "number";
    input.step = "any";
    input.className = "val-input";
    input.dataset.gid = gid;
    input.dataset.idx = idx;
    input.value = val;
    input.placeholder = isLast ? "+" : "";
    if (isLast) input.classList.add("add-slot");
    else styleInput(input, val, p);

    input.style.caretColor = p.color;

    input.addEventListener("keydown", e => {
      if (e.key === "Tab") { e.preventDefault(); handleTab(gid); }
      if (e.key === "e" || e.key === "E") e.preventDefault();
    });

    input.addEventListener("input", e => {
      handleValueInput(gid, idx, e.target.value);
    });

    input.addEventListener("focus", e => {
      if (isLast) e.target.select();
    });

    const dot = document.createElement("div");
    dot.className = "slot-dot";
    dot.style.background = (val !== "" && !isLast) ? p.color : "#2a2520";

    slot.appendChild(num);
    slot.appendChild(input);
    slot.appendChild(dot);
    container.appendChild(slot);
  });

  // Restore focus
  if (focusedIdx !== null) {
    const el = container.querySelector(`[data-idx="${focusedIdx}"]`);
    if (el) el.focus();
  }

  // Update stats
  updateGroupStats(gid);
}

// ── HANDLE VALUE INPUT ────────────────────────────────────────
function handleValueInput(gid, idx, rawVal) {
  const g = groups.find(g => g.id === gid);
  if (!g) return;

  g.values[idx] = rawVal;

  // Re-render values (handles trailing empty logic)
  renderGroupValues(gid);
  updateResult();

  // Auto-advance if something was typed
  if (rawVal !== "") {
    const container = document.getElementById(`values-${gid}`);
    const nextInput = container.querySelector(`[data-idx="${idx + 1}"]`);
    if (nextInput) { nextInput.focus(); nextInput.select(); }
  }
}

// ── TAB → NEXT GROUP ─────────────────────────────────────────
function handleTab(gid) {
  const idx = groups.findIndex(g => g.id === gid);
  const nextGroup = groups[(idx + 1) % groups.length];
  const container = document.getElementById(`values-${nextGroup.id}`);
  if (!container) return;
  // Focus first empty (non-last) slot, or the + slot
  const inputs = container.querySelectorAll(".val-input");
  let target = null;
  for (const inp of inputs) {
    if (inp.value === "") { target = inp; break; }
  }
  if (!target && inputs.length) target = inputs[inputs.length - 1];
  if (target) { target.focus(); target.select(); }
}

// ── UPDATE GROUP STATS ────────────────────────────────────────
function updateGroupStats(gid) {
  const g = groups.find(g => g.id === gid);
  if (!g) return;
  const p = pal(groups.indexOf(g));
  const el = document.getElementById(`stats-${gid}`);
  if (!el) return;
  const { count, avg } = groupStats(g);
  el.innerHTML =
    `<span class="num" style="color:${p.color}">${count}</span> wartości` +
    (avg !== null ? ` &nbsp;·&nbsp; śr: <span class="num" style="color:${p.color}">${avg.toFixed(3)}</span>` : "");
}

// ── RENDER SINGLE GROUP CARD ──────────────────────────────────
function renderGroupCard(g) {
  const idx = groups.indexOf(g);
  const p = pal(idx);

  const card = document.createElement("div");
  card.className = "group-card";
  card.id = `group-${g.id}`;
  card.style.cssText = `background:${p.bg};border:1px solid ${p.border};border-left:4px solid ${p.color};`;

  // Header
  const header = document.createElement("div");
  header.className = "group-header";

  const labelInput = document.createElement("input");
  labelInput.type = "text";
  labelInput.className = "group-label-input";
  labelInput.value = g.label;
  labelInput.style.color = p.color;
  labelInput.addEventListener("input", e => {
    g.label = e.target.value;
    updateResult();
  });
  labelInput.addEventListener("keydown", e => {
    if (e.key === "Tab") { e.preventDefault(); handleTab(g.id); }
  });

  const weightGroup = document.createElement("div");
  weightGroup.className = "weight-group";

  const wLabel = document.createElement("span");
  wLabel.className = "weight-label";
  wLabel.textContent = "waga:";

  const weightInput = document.createElement("input");
  weightInput.type = "number";
  weightInput.className = "weight-input";
  weightInput.value = g.weight.toFixed(3);
  weightInput.min = 0; weightInput.step = 0.001;
  weightInput.style.color = p.color;
  weightInput.style.borderBottomColor = p.color + "60";
  weightInput.addEventListener("input", e => {
    let v = parseFloat(e.target.value);
    if (isNaN(v) || v < 0) v = 0;
    // clamp to 3 decimal places
    v = Math.round(v * 1000) / 1000;
    g.weight = v;
    updateWeightBadge(g.id);
    updateResult();
  });
  weightInput.addEventListener("keydown", e => {
    if (e.key === "Tab") { e.preventDefault(); handleTab(g.id); }
  });

  const badge = document.createElement("div");
  badge.className = "badge";
  badge.id = `badge-${g.id}`;
  badge.style.cssText = `background:${p.color}20;color:${p.color};border:1px solid ${p.color}50`;
  badge.textContent = `${(g.weight * 100).toFixed(1)}%`;

  weightGroup.appendChild(wLabel);
  weightGroup.appendChild(weightInput);
  weightGroup.appendChild(badge);

  const stats = document.createElement("div");
  stats.className = "group-stats";
  stats.id = `stats-${g.id}`;

  const removeBtn = document.createElement("button");
  removeBtn.className = "remove-btn";
  removeBtn.title = "Usuń grupę";
  removeBtn.textContent = "×";
  removeBtn.onclick = () => removeGroup(g.id);

  header.appendChild(labelInput);
  header.appendChild(weightGroup);
  header.appendChild(stats);
  header.appendChild(removeBtn);
  card.appendChild(header);

  // Values grid
  const valGrid = document.createElement("div");
  valGrid.className = "values-grid";
  valGrid.id = `values-${g.id}`;
  card.appendChild(valGrid);

  return card;
}

// ── UPDATE WEIGHT BADGE ───────────────────────────────────────
function updateWeightBadge(gid) {
  const g = groups.find(g => g.id === gid);
  if (!g) return;
  const el = document.getElementById(`badge-${gid}`);
  if (el) el.textContent = `${(g.weight * 100).toFixed(1)}%`;
}

// ── FULL RENDER ───────────────────────────────────────────────
function fullRender() {
  const container = document.getElementById("groups");
  container.innerHTML = "";
  groups.forEach(g => {
    const card = renderGroupCard(g);
    container.appendChild(card);
    renderGroupValues(g.id);
  });
  // Show/hide remove buttons
  updateRemoveBtns();
  updateResult();
}

function updateRemoveBtns() {
  document.querySelectorAll(".remove-btn").forEach(btn => {
    btn.style.display = groups.length > 1 ? "flex" : "none";
  });
}

// ── ADD / REMOVE GROUP ────────────────────────────────────────
document.getElementById("add-group-btn").addEventListener("click", () => {
  const idx = groups.length;
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const label = "Grupa " + (letters[idx] || (idx + 1));
  groups.push({ id: nextId++, label, weight: 0.100, values: [""] });

  const container = document.getElementById("groups");
  const g = groups[groups.length - 1];
  const card = renderGroupCard(g);
  container.appendChild(card);
  renderGroupValues(g.id);
  updateRemoveBtns();
  updateResult();

  // Focus new group's first input
  setTimeout(() => {
    const inp = document.querySelector(`#values-${g.id} .val-input`);
    if (inp) inp.focus();
  }, 50);
});

function removeGroup(gid) {
  if (groups.length <= 1) return;
  groups = groups.filter(g => g.id !== gid);
  const card = document.getElementById(`group-${gid}`);
  if (card) card.remove();
  updateRemoveBtns();
  updateResult();
}

// ── CLEAR ALL ─────────────────────────────────────────────────
function clearAll() {
  groups.forEach(g => { g.values = [""]; });
  groups.forEach(g => renderGroupValues(g.id));
  updateResult();
}

// ── INIT ──────────────────────────────────────────────────────
fullRender();
</script>
</body>
</html>
